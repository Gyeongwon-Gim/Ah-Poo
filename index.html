<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#e8f4fc" />
    <meta name="apple-mobile-web-app-title" content="어푸!" />

    <!-- 카카오맵 SDK·지도 타일 이미지 로딩을 앞당기기 위한 사전 연결 힌트.
         문서 파싱 시점에 DNS/TCP/TLS 핸드셰이크를 미리 끝내 둔다. -->
    <link rel="preconnect" href="https://dapi.kakao.com" crossorigin />
    <link rel="preconnect" href="https://t1.daumcdn.net" crossorigin />
    <link rel="preconnect" href="https://map.daumcdn.net" crossorigin />
    <link rel="dns-prefetch" href="https://map0.daumcdn.net" />
    <link rel="dns-prefetch" href="https://map1.daumcdn.net" />
    <link rel="dns-prefetch" href="https://map2.daumcdn.net" />
    <link rel="dns-prefetch" href="https://map3.daumcdn.net" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="description" content="어푸! — 수영장 찾기 · 수영 운동 기록" />
    <title>어푸!</title>
  </head>
  <body>
    <svg width="0" height="0" style="position: absolute" aria-hidden="true">
      <defs>
        <filter
          id="glassforge-glass-distortion"
          x="0%"
          y="0%"
          width="100%"
          height="100%"
        >
          <feTurbulence
            type="fractalNoise"
            baseFrequency="0.012 0.012"
            numOctaves="2"
            seed="92"
            result="noise"
          />
          <feGaussianBlur in="noise" stdDeviation="2" result="blurred" />
          <feDisplacementMap
            in="SourceGraphic"
            in2="blurred"
            scale="85"
            xChannelSelector="R"
            yChannelSelector="G"
          />
        </filter>
      </defs>
    </svg>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
